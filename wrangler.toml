name = "ailearning"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "aitrustaudit-db"
# Replace this with your actual D1 database ID after running:
# wrangler d1 create aitrustaudit-db
database_id = "3e0ce152-cd1a-4df3-bba1-3778721e0b03"

# KV namespace for cache (required by opennextjs-cloudflare)
[[kv_namespaces]]
binding = "NEXT_CACHE_WORKERS_KV"
# Replace with your KV namespace ID after running:
# wrangler kv namespace create NEXT_CACHE_WORKERS_KV
id = "0a9681faffa742e7a71998b29d7049cc"

[vars]
# Public vars only — secrets go in Cloudflare dashboard Workers > Settings > Variables
NEXT_PUBLIC_APP_URL = "https://aitrustaudit.com"

[[rules]]
type = "ESModule"
globs = ["**/*.js"]
fallthrough = true
